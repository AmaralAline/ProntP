<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: #0a0f1a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .topo {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .topo-titulo {
            font-size: 15px;
            font-weight: 900;
            color: #fbbf24;
        }

        .topo-sub {
            font-size: 10px;
            color: #334155;
            margin-top: 1px;
        }

        .stats {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .stat-pill {
            background: #141d2b;
            border: 1px solid rgba(251,191,36,0.25);
            border-radius: 20px;
            padding: 3px 11px;
            font-size: 11px;
            font-weight: 800;
            color: #fbbf24;
        }

            .stat-pill span {
                color: #475569;
                font-weight: 400;
                font-size: 10px;
            }

        .nivel-bar {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nivel-label {
            font-size: 10px;
            color: #475569;
        }

        .nivel-btn {
            background: #141d2b;
            border: 1px solid rgba(251,191,36,0.2);
            border-radius: 6px;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: 800;
            color: #64748b;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            transition: all 0.15s;
        }

            .nivel-btn.ativo {
                background: #3a2800;
                border-color: #d97706;
                color: #fde68a;
            }

            .nivel-btn:hover:not(.ativo) {
                color: #94a3b8;
            }

            .nivel-btn.dificil-btn.ativo {
                background: #200a0a;
                border-color: #ef4444;
                color: #fca5a5;
            }

        .banner {
            text-align: center;
            padding: 5px 10px;
            border-radius: 7px;
            font-size: 12px;
            font-weight: 800;
            display: none;
        }

            .banner.ok {
                background: rgba(52,211,153,0.12);
                border: 1px solid rgba(52,211,153,0.4);
                color: #34d399;
            }

            .banner.err {
                background: rgba(248,113,113,0.12);
                border: 1px solid rgba(248,113,113,0.4);
                color: #f87171;
            }

        .arena {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .cenas {
            display: flex;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .cena-wrap {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .cena-label {
            font-size: 10px;
            font-weight: 800;
            color: #475569;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .cena {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(251,191,36,0.18);
            background: #0d1520;
            line-height: 0;
        }

            .cena.clicavel {
                cursor: crosshair;
            }

            .cena svg {
                width: 100%;
                height: auto;
                display: block;
            }

        .marcador {
            position: absolute;
            border-radius: 50%;
            border: 3px solid #34d399;
            background: rgba(52,211,153,0.2);
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: pop 0.3s ease;
        }

        @keyframes pop {
            from {
                transform: translate(-50%,-50%) scale(0.2);
                opacity: 0;
            }

            to {
                transform: translate(-50%,-50%) scale(1);
                opacity: 1;
            }
        }

        .painel {
            width: 156px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .erros-card {
            background: #141d2b;
            border: 1px solid rgba(251,191,36,0.18);
            border-radius: 10px;
            padding: 10px;
        }

        .erros-titulo {
            font-size: 9px;
            color: #d97706;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .erros-lista {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .erro-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: #475569;
            line-height: 1.3;
            padding: 4px 7px;
            border-radius: 7px;
            border: 1px solid rgba(251,191,36,0.1);
            background: #0f1621;
            transition: all 0.3s;
        }

            .erro-item.encontrado {
                color: #34d399;
                background: rgba(52,211,153,0.07);
                border-color: rgba(52,211,153,0.25);
            }

        .erro-check {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 2px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            transition: all 0.3s;
        }

        .erro-item.encontrado .erro-check {
            background: #34d399;
            border-color: #34d399;
            color: #0a0f1a;
        }

        .btn-dica {
            background: transparent;
            border: 1px solid rgba(251,191,36,0.25);
            border-radius: 8px;
            padding: 7px;
            font-size: 11px;
            font-weight: 800;
            color: #64748b;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            transition: all 0.15s;
        }

            .btn-dica:hover {
                border-color: rgba(251,191,36,0.5);
                color: #fbbf24;
            }

        .btn-novo {
            background: #d97706;
            border: none;
            border-radius: 8px;
            padding: 8px;
            font-size: 12px;
            font-weight: 800;
            color: #fff;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            transition: background 0.15s;
        }

            .btn-novo:hover {
                background: #b45309;
            }

        #win {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10,15,26,0.97);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            text-align: center;
            padding: 24px;
            z-index: 30;
        }

            #win.visivel {
                display: flex;
            }

        .win-trofeu {
            font-size: 56px;
        }

        .win-titulo {
            font-size: 22px;
            font-weight: 900;
            color: #fbbf24;
        }

        .win-sub {
            font-size: 13px;
            color: #475569;
        }

        .win-stats {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .win-stat {
            background: #141d2b;
            border: 1px solid rgba(251,191,36,0.2);
            border-radius: 10px;
            padding: 10px 20px;
        }

        .win-stat-val {
            font-size: 22px;
            font-weight: 900;
            color: #fbbf24;
        }

        .win-stat-lab {
            font-size: 10px;
            color: #475569;
        }

        .badge-dificil {
            display: inline-block;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            color: #fca5a5;
            font-size: 9px;
            font-weight: 800;
            padding: 2px 7px;
            border-radius: 5px;
            margin-left: 6px;
            vertical-align: middle;
        }

                    { label: 'Maçaneta do prédio 2', cx: 154, cy: 306, r: 14 },
                    { label: 'Janelas do prédio 3', cx: 221, cy: 160, r: 30 },
                    { label: 'Cor da caixa d\'água', cx: 310, cy: 58, r: 24 },
                    { label: 'Janelas do prédio 5', cx: 409, cy: 138, r: 50 },
                    { label: 'Luzes do poste', cx: 239, cy: 238, r: 22 },
                    { label: 'Cor do carro', cx: 90, cy: 305, r: 46 },
                    { label: 'Luz de freio do carro', cx: 130, cy: 301, r: 14 },
                ]
            },

        ];

        // ─── ESTADO ───
        let jogoIdx = 0, encontrados = [], inicio = Date.now();

        function setJogo(idx, btn) {
            jogoIdx = idx;
            document.querySelectorAll('.nivel-btn').forEach(b => b.classList.remove('ativo'));
            btn.classList.add('ativo');
            novoJogo();
        }

        function novoJogo() {
            encontrados = []; inicio = Date.now();
            document.getElementById('win').classList.remove('visivel');
            const b = document.getElementById('banner'); b.className = 'banner'; b.style.display = 'none';
            document.getElementById('cena-b').querySelectorAll('.marcador').forEach(m => m.remove());

            const cena = CENAS[jogoIdx];
            document.getElementById('svg-a').innerHTML = cena.A();
            document.getElementById('svg-b').innerHTML = cena.B();

            const isDif = cena.dificil;
            document.getElementById('badge-dificil').style.display = isDif ? 'inline-block' : 'none';
            document.getElementById('erros-titulo').textContent = `🎯 ${cena.erros.length} diferenças`;
            document.getElementById('stat-tot').innerHTML = `${cena.erros.length} <span>erros</span>`;

            const lista = document.getElementById('erros-lista');
            lista.innerHTML = '';
            cena.erros.forEach((e, i) => {
                const d = document.createElement('div');
                d.className = 'erro-item'; d.id = `ei-${i}`;
                d.innerHTML = `<div class="erro-check"></div><span>${e.label}</span>`;
                lista.appendChild(d);
            });
            atualizarStats();
        }

        function clicarB(event) {
            const cena = CENAS[jogoIdx];
            const svgEl = document.getElementById('svg-b');
            const rect = svgEl.getBoundingClientRect();
            const cx = (event.clientX - rect.left) * (480 / rect.width);
            const cy = (event.clientY - rect.top) * (320 / rect.height);

            let acertou = false;
            cena.erros.forEach((e, i) => {
                if (encontrados.includes(i)) return;
                if (Math.sqrt((cx - e.cx) ** 2 + (cy - e.cy) ** 2) <= e.r + 10) {
                    encontrados.push(i); acertou = true;
                    adicionarMarcador(event);
                    const item = document.getElementById(`ei-${i}`);
                    if (item) { item.classList.add('encontrado'); item.querySelector('.erro-check').textContent = '✓'; }
                    atualizarStats();
                    banner(`✅ Encontrou! — ${e.label}`, 'ok');
                    if (encontrados.length === cena.erros.length) setTimeout(vitoria, 700);
                }
            });
            if (!acertou) banner('❌ Não é aqui... tente em outro lugar!', 'err');
        }

        function adicionarMarcador(event) {
            const el = document.getElementById('cena-b');
            const rect = el.getBoundingClientRect();
            const m = document.createElement('div');
            m.className = 'marcador';
            m.style.width = m.style.height = '32px';
            m.style.left = (event.clientX - rect.left) + 'px';
            m.style.top = (event.clientY - rect.top) + 'px';
            el.appendChild(m);
        }

        function atualizarStats() {
            document.getElementById('stat-enc').innerHTML = `${encontrados.length} <span>encontrados</span>`;
        }

        function dica() {
            const cena = CENAS[jogoIdx];
            const restantes = cena.erros.filter((_, i) => !encontrados.includes(i));
            if (restantes.length === 0) return;
            banner(`💡 Dica: procure — ${restantes[0].label}`, 'ok');
        }

        function vitoria() {
            document.getElementById('win-t').textContent = Math.round((Date.now() - inicio) / 1000);
            document.getElementById('win-e').textContent = CENAS[jogoIdx].erros.length;
            document.getElementById('win-sub').textContent = CENAS[jogoIdx].dificil
                ? '🔥 Incrível! Você completou o nível DIFÍCIL!' : 'Você encontrou todas as diferenças!';
            document.getElementById('win').classList.add('visivel');
        }

        function banner(txt, tipo) {
            const b = document.getElementById('banner');
            b.textContent = txt; b.className = `banner ${tipo}`; b.style.display = 'block';
            clearTimeout(b._t); b._t = setTimeout(() => { b.style.display = 'none'; }, 2400);
        }

        novoJogo();
    </script>
