<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo dos 7 Erros — ProntPsi</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }

html, body {
  height: 100%; width: 100%;
  font-family: 'Nunito', sans-serif;
  background: #0a0f1a;
  color: #e2e8f0;
  overflow: hidden;
}

body {
  display: flex; flex-direction: column;
  padding: 10px 14px; gap: 7px;
}

/* TOPO */
.topo {
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; gap: 8px; flex-wrap: wrap;
}
.topo-titulo { font-size: 15px; font-weight: 900; color: #fbbf24; }
.topo-sub    { font-size: 10px; color: #334155; margin-top: 1px; }

.stats { display: flex; gap: 6px; align-items: center; }
.stat-pill {
  background: #141d2b; border: 1px solid rgba(251,191,36,0.25);
  border-radius: 20px; padding: 3px 11px;
  font-size: 11px; font-weight: 800; color: #fbbf24;
}
.stat-pill span { color: #475569; font-weight: 400; font-size: 10px; }

/* NIVEL */
.nivel-bar { display: flex; gap: 5px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
.nivel-label { font-size: 10px; color: #475569; }
.nivel-btn {
  background: #141d2b; border: 1px solid rgba(251,191,36,0.2);
  border-radius: 6px; padding: 3px 10px; font-size: 11px; font-weight: 800;
  color: #64748b; cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.15s;
}
.nivel-btn.ativo { background: #3a2800; border-color: #d97706; color: #fde68a; }
.nivel-btn:hover:not(.ativo) { color: #94a3b8; }

/* BANNER */
.banner {
  text-align: center; padding: 5px 10px; border-radius: 7px;
  font-size: 12px; font-weight: 800; display: none; flex-shrink: 0;
}
.banner.ok  { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.35); color: #34d399; }
.banner.err { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.35); color: #f87171; }

/* ARENA — dois painéis lado a lado */
.arena {
  flex: 1; min-height: 0;
  display: flex; gap: 10px; overflow: hidden;
}

.cena-wrap {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; gap: 5px;
}
.cena-label {
  font-size: 10px; font-weight: 800; color: #475569;
  text-align: center; text-transform: uppercase; letter-spacing: 0.8px; flex-shrink: 0;
}

.cena {
  position: relative; flex: 1; min-height: 0;
  border-radius: 12px; overflow: hidden;
  border: 2px solid rgba(251,191,36,0.18);
  background: #141d2b;
  cursor: default;
}

/* A cena B fica clicável */
.cena.clicavel { cursor: crosshair; }

/* SVG ocupa 100% */
.cena svg {
  width: 100%; height: 100%;
  display: block;
}

/* Marcador de erro encontrado */
.marcador {
  position: absolute;
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 3px solid #34d399;
  background: rgba(52,211,153,0.18);
  transform: translate(-50%, -50%);
  pointer-events: none;
  animation: pulseIn 0.35s ease;
}
@keyframes pulseIn {
  from { transform: translate(-50%,-50%) scale(0.3); opacity:0; }
  to   { transform: translate(-50%,-50%) scale(1);   opacity:1; }
}

/* BARRA LATERAL DIREITA — progresso */
.painel-lateral {
  width: 160px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 7px; overflow: hidden;
}

.erros-card {
  background: #141d2b; border: 1px solid rgba(251,191,36,0.18);
  border-radius: 10px; padding: 10px; flex: 1; overflow: auto;
}
.erros-titulo {
  font-size: 9px; color: #d97706; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px;
}
.erros-lista { display: flex; flex-direction: column; gap: 5px; }
.erro-item {
  display: flex; align-items: center; gap: 7px;
  font-size: 11px; color: #475569; line-height: 1.3;
  padding: 5px 7px; border-radius: 7px;
  border: 1px solid rgba(251,191,36,0.1);
  background: #0f1621;
  transition: all 0.3s;
}
.erro-item.encontrado {
  color: #34d399;
  background: rgba(52,211,153,0.07);
  border-color: rgba(52,211,153,0.25);
}
.erro-check {
  width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid #334155;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; transition: all 0.3s;
}
.erro-item.encontrado .erro-check {
  background: #34d399; border-color: #34d399; color: #0a0f1a;
}

.btn-novo {
  background: #d97706; border: none; border-radius: 8px;
  padding: 8px; font-size: 12px; font-weight: 800;
  color: #fff; cursor: pointer; font-family: 'Nunito', sans-serif;
  transition: background 0.15s; flex-shrink: 0;
}
.btn-novo:hover { background: #b45309; }

.btn-dica {
  background: transparent; border: 1px solid rgba(251,191,36,0.25);
  border-radius: 8px; padding: 7px; font-size: 11px; font-weight: 800;
  color: #64748b; cursor: pointer; font-family: 'Nunito', sans-serif;
  transition: all 0.15s; flex-shrink: 0;
}
.btn-dica:hover { border-color: rgba(251,191,36,0.5); color: #fbbf24; }

/* WIN */
#win {
  display: none; position: fixed; inset: 0;
  background: rgba(10,15,26,0.97);
  flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; text-align: center; padding: 24px; z-index: 30;
}
#win.visivel { display: flex; }
.win-trofeu { font-size: 58px; }
.win-titulo { font-size: 24px; font-weight: 900; color: #fbbf24; }
.win-sub    { font-size: 13px; color: #475569; }
.win-stats  { display: flex; gap: 12px; justify-content: center; }
.win-stat   { background: #141d2b; border: 1px solid rgba(251,191,36,0.2); border-radius: 10px; padding: 10px 20px; }
.win-stat-val { font-size: 24px; font-weight: 900; color: #fbbf24; }
.win-stat-lab { font-size: 10px; color: #475569; }
</style>
</head>
<body>

<div class="topo">
  <div>

  </div>
  <div class="stats">
    <div class="stat-pill" id="stat-enc">0 <span>encontrados</span></div>

    </div>
  </div>

  <!-- IMAGEM B (com erros, clicável) -->
  <div class="cena-wrap">
    <div class="cena-label">🔍 Encontre os erros aqui</div>

    <button class="btn-novo" onclick="novoJogo()">🔀 Nova cena</button>

</div>

<div id="win">

let cenaIdx = 0;
let encontrados = [];
let tempoInicio = Date.now();
let dicaUsada = 0;

function setCena(idx, btn) {
  cenaIdx = idx;
  document.querySelectorAll('.nivel-btn').forEach(b => b.classList.remove('ativo'));
  btn.classList.add('ativo');
  novoJogo();
}

function novoJogo() {
  encontrados = [];
  tempoInicio = Date.now();
  dicaUsada = 0;
  document.getElementById('win').classList.remove('visivel');
  document.getElementById('banner').className = 'banner';
  document.getElementById('banner').style.display = 'none';

  renderizarCenas();
  renderizarLista();
  atualizarStats();
}

function renderizarCenas() {
  const cena = CENAS[cenaIdx];

  // Cena A — original
  document.getElementById('svg-a').innerHTML = cena.base;

  // Cena B — base + diferenças aplicadas
  let svgB = cena.base;
  cena.erros.forEach((e, i) => {
    // Adicionamos marcador invisível para auxiliar clique
    svgB += `<circle data-erro="${i}" cx="${e.cx}" cy="${e.cy}" r="${e.r}" fill="transparent" style="cursor:crosshair"/>`;
    svgB += e.svg; // aplica diferença
  });
  document.getElementById('svg-b').innerHTML = svgB;

  // Limpa marcadores antigos
  const cenaB = document.getElementById('cena-b');
  cenaB.querySelectorAll('.marcador').forEach(m => m.remove());
}

function renderizarLista() {
  const cena = CENAS[cenaIdx];
  const lista = document.getElementById('erros-lista');
  lista.innerHTML = '';
  cena.erros.forEach((e, i) => {
    const item = document.createElement('div');
    item.className = 'erro-item' + (encontrados.includes(i) ? ' encontrado' : '');
    item.id = `erro-item-${i}`;
    item.innerHTML = `<div class="erro-check">${encontrados.includes(i) ? '✓' : ''}</div><span>${e.label}</span>`;
    lista.appendChild(item);
  });
}

function atualizarStats() {
  document.getElementById('stat-enc').innerHTML = `${encontrados.length} <span>encontrados</span>`;
  document.getElementById('stat-total').innerHTML = `${CENAS[cenaIdx].erros.length} <span>erros</span>`;
}

function clicarCenaB(event) {
  const cena = CENAS[cenaIdx];
  const svgEl = document.getElementById('svg-b');
  const rect = svgEl.getBoundingClientRect();

  // Converte clique para coordenadas do viewBox (0 0 500 360)
  const ratioX = 500 / rect.width;
  const ratioY = 360 / rect.height;
  const cx = (event.clientX - rect.left) * ratioX;
  const cy = (event.clientY - rect.top) * ratioY;

  let acertou = false;
  cena.erros.forEach((e, i) => {
    if (encontrados.includes(i)) return;
    const dist = Math.sqrt((cx - e.cx) ** 2 + (cy - e.cy) ** 2);
    if (dist <= e.r + 10) {
      encontrados.push(i);
      acertou = true;
      marcarNaCena(event, i);
      document.getElementById(`erro-item-${i}`).className = 'erro-item encontrado';
      document.getElementById(`erro-item-${i}`).querySelector('.erro-check').textContent = '✓';
      atualizarStats();
      mostrarBanner(`✅ Isso! — ${e.label}`, 'ok');
      if (encontrados.length === cena.erros.length) setTimeout(vitoria, 700);
    }
  });

  if (!acertou) {
    mostrarBanner('❌ Não é aqui... tente em outro lugar!', 'err');
  }
}

function marcarNaCena(event, idx) {
  const cenaEl = document.getElementById('cena-b');
  const rect = cenaEl.getBoundingClientRect();
  const x = event.clientX - rect.left;
  const y = event.clientY - rect.top;
  const div = document.createElement('div');
  div.className = 'marcador';
  div.style.left = x + 'px';
  div.style.top  = y + 'px';
  cenaEl.appendChild(div);
}

function darDica() {
  const cena = CENAS[cenaIdx];
  const restantes = cena.erros.map((_, i) => i).filter(i => !encontrados.includes(i));
  if (restantes.length === 0) return;
  const idx = restantes[0];
  const e = cena.erros[idx];
  mostrarBanner(`💡 Dica: olhe na área de "${e.label}"`, 'ok');
}

function mostrarBanner(txt, tipo) {
  const b = document.getElementById('banner');
  b.textContent = txt;
  b.className = `banner ${tipo}`;
  b.style.display = 'block';
  clearTimeout(b._t);
  b._t = setTimeout(() => { b.style.display = 'none'; }, 2400);
}

function vitoria() {
  const tempo = Math.round((Date.now() - tempoInicio) / 1000);
  document.getElementById('win-tempo').textContent = tempo;
  document.getElementById('win').classList.add('visivel');
}

novoJogo();
</script>
