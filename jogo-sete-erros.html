<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo dos 7 Erros — ProntPsi</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: #0a0f1a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .topo {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .topo-titulo {
            font-size: 15px;
            font-weight: 900;
            color: #fbbf24;
        }

        .topo-sub {
            font-size: 10px;
            color: #334155;
            margin-top: 1px;
        }

        .stats {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .stat-pill {
            background: #141d2b;
            border: 1px solid rgba(251,191,36,0.25);
            border-radius: 20px;
            padding: 3px 11px;
            font-size: 11px;
            font-weight: 800;
            color: #fbbf24;
        }

            .stat-pill span {
                color: #475569;
                font-weight: 400;
                font-size: 10px;
            }

        .nivel-bar {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nivel-label {
            font-size: 10px;
            color: #475569;
        }

        .nivel-btn {
            background: #141d2b;
            border: 1px solid rgba(251,191,36,0.2);
            border-radius: 6px;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: 800;
            color: #64748b;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            transition: all 0.15s;
        }

            .nivel-btn.ativo {
                background: #3a2800;
                border-color: #d97706;
                color: #fde68a;
            }

            .nivel-btn:hover:not(.ativo) {
                color: #94a3b8;
            }

        .banner {
            text-align: center;
            padding: 5px 10px;
            border-radius: 7px;
            font-size: 12px;
            font-weight: 800;
            display: none;
        }

            .banner.ok {
                background: rgba(52,211,153,0.12);
                border: 1px solid rgba(52,211,153,0.4);
                color: #34d399;
            }

            .banner.err {
                background: rgba(248,113,113,0.12);
                border: 1px solid rgba(248,113,113,0.4);
                color: #f87171;
            }

        /* ARENA */
        .arena {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .cenas {
            display: flex;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .cena-wrap {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .cena-label {
            font-size: 10px;
            font-weight: 800;
            color: #475569;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .cena {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(251,191,36,0.18);
            background: #0d1520;
            line-height: 0;
        }

            .cena.clicavel {
                cursor: crosshair;
            }

            .cena svg {
                width: 100%;
                height: auto;
                display: block;
            }

        .marcador {
            position: absolute;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 3px solid #34d399;
            background: rgba(52,211,153,0.2);
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: pop 0.3s ease;
        }

        @keyframes pop {
            from {
                transform: translate(-50%,-50%) scale(0.2);
                opacity: 0;
            }

            to {
                transform: translate(-50%,-50%) scale(1);
                opacity: 1;
            }
        }

        /* PAINEL LATERAL */
        .painel {
            width: 156px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .erros-card {
            background: #141d2b;
            border: 1px solid rgba(251,191,36,0.18);
            border-radius: 10px;
            padding: 10px;
        }

        .erros-titulo {
            font-size: 9px;
            color: #d97706;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .erros-lista {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .erro-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #475569;
            line-height: 1.3;
            padding: 5px 7px;
            border-radius: 7px;
            border: 1px solid rgba(251,191,36,0.1);
            background: #0f1621;
            transition: all 0.3s;
        }

            .erro-item.encontrado {
                color: #34d399;
                background: rgba(52,211,153,0.07);
                border-color: rgba(52,211,153,0.25);
            }

        .erro-check {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 2px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            transition: all 0.3s;
        }

        .erro-item.encontrado .erro-check {
            background: #34d399;
            border-color: #34d399;
            color: #0a0f1a;
        }

        .btn-dica {
            background: transparent;
            border: 1px solid rgba(251,191,36,0.25);
            border-radius: 8px;
            padding: 7px;
            font-size: 11px;
            font-weight: 800;
            color: #64748b;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            transition: all 0.15s;
        }

            .btn-dica:hover {
                border-color: rgba(251,191,36,0.5);
                color: #fbbf24;
            }

        .btn-novo {
            background: #d97706;
            border: none;
            border-radius: 8px;
            padding: 8px;
            font-size: 12px;
            font-weight: 800;
            color: #fff;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            transition: background 0.15s;
        }

            .btn-novo:hover {
                background: #b45309;
            }

        /* WIN */
        #win {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10,15,26,0.97);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            text-align: center;
            padding: 24px;
            z-index: 30;
        }

            #win.visivel {
                display: flex;
            }

        .win-trofeu {
            font-size: 56px;
        }

        .win-titulo {
            font-size: 22px;
            font-weight: 900;
            color: #fbbf24;
        }

        .win-sub {
            font-size: 13px;
            color: #475569;
        }

        .win-stats {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .win-stat {
            background: #141d2b;
            border: 1px solid rgba(251,191,36,0.2);
            border-radius: 10px;
            padding: 10px 20px;
        }

        .win-stat-val {
            font-size: 22px;
            font-weight: 900;
            color: #fbbf24;
        }

        .win-stat-lab {
            font-size: 10px;
            color: #475569;
        }
    </style>
</head>
<body>

    <div class="topo">
        <div>
            <div class="topo-titulo">🔍 Jogo dos 7 Erros</div>
            <div class="topo-sub">Clique nas diferenças na imagem da direita</div>
        </div>
        <div class="stats">
            <div class="stat-pill" id="stat-enc">0 <span>encontrados</span></div>
            <div class="stat-pill" id="stat-tot">7 <span>erros</span></div>
        </div>
    </div>

    <div class="nivel-bar">
        <span class="nivel-label">Cena:</span>
        <button class="nivel-btn ativo" onclick="setCena(0,this)">🏠 Quarto</button>
        <button class="nivel-btn" onclick="setCena(1,this)">🌳 Parque</button>
        <button class="nivel-btn" onclick="setCena(2,this)">🐠 Mar</button>
    </div>

    <div class="banner" id="banner"></div>

    <div class="arena">
        <div class="cenas">
            <div class="cena-wrap">
                <div class="cena-label">🖼 Original</div>
                <div class="cena" id="cena-a">
                    <svg id="svg-a" viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg"></svg>
                </div>
            </div>
            <div class="cena-wrap">
                <div class="cena-label">🔍 Encontre os erros aqui</div>
                <div class="cena clicavel" id="cena-b" onclick="clicarB(event)">
                    <svg id="svg-b" viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg"></svg>
                </div>
            </div>
        </div>

        <div class="painel">
            <div class="erros-card">
                <div class="erros-titulo">🎯 7 diferenças</div>
                <div class="erros-lista" id="erros-lista"></div>
            </div>
            <button class="btn-dica" onclick="dica()">💡 Dica</button>
            <button class="btn-novo" onclick="novoJogo()">🔀 Nova cena</button>
        </div>
    </div>

    <div id="win">
        <div class="win-trofeu">🎉</div>
        <div class="win-titulo">Parabéns!</div>
        <div class="win-sub">Você encontrou todas as diferenças!</div>
        <div class="win-stats">
            <div class="win-stat"><div class="win-stat-val" id="win-t">-</div><div class="win-stat-lab">segundos</div></div>
            <div class="win-stat"><div class="win-stat-val">7</div><div class="win-stat-lab">diferenças</div></div>
        </div>
        <button class="btn-novo" style="width:180px;padding:10px;" onclick="novoJogo()">🔀 Nova cena</button>
    </div>

    <script>
        // ─────────────────────────────────────────────────────────────
        // REGRA DE OURO: toda diferença é uma TROCA DE COR FORTE
        // Nenhum elemento "some" — apenas muda de cor visivelmente
        // ─────────────────────────────────────────────────────────────

        const CENAS = [

            // ══════════════════════════════════════════════════════
            // CENA 0 — QUARTO
            // ══════════════════════════════════════════════════════
            {
                nome: 'Quarto',

                elementos: {
                    // fundo e chão

                    <rect x="0" y="240" width="480" height="80" fill="#0e1828"/>

                    // cama
                    cama: `<rect x="250" y="170" width="210" height="100" rx="6" fill="#1e2e44"/>

                    <rect x="260" y="202" width="190" height="64" rx="4" fill="#243550"/>`,
                    // travesseiro — original LILÁS, B LARANJA
                    travA: `<rect x="264" y="178" width="58" height="28" rx="6" fill="#c4b5fd"/>`,
                    travB: `<rect x="264" y="178" width="58" height="28" rx="6" fill="#f97316"/>`,
                    // mesinha
                    mesa: `<rect x="168" y="220" width="68" height="46" rx="4" fill="#1e2e40"/>

                    quadro: `<rect x="185" y="45" width="76" height="56" rx="3" fill="#161e2e" stroke="#3a2a6a" stroke-width="2"/>`,

                    <circle cx="89" cy="258" r="5" fill="#1d4ed8"/>

                    <path d="M92,270 Q95,273 98,270" stroke="#1a0a00" stroke-width="1.2" fill="none"/>`,

                    macacaB: `<circle cx="395" cy="188" r="5" fill="#4ade80"/>`,
                    // livros na estante — original VERMELHO, B ROXO
                    livrosA: `<rect x="30" y="150" width="12" height="50" rx="2" fill="#ef4444"/>

                // 7 diferenças: qual chave é diferente em B, label, posição de clique

                    { chave: 'livros', label: 'Cor dos livros', cx: 54, cy: 175, r: 32 },

                    return this.elementos.fundo + this.elementos.janela + this.elementos.mesa +
                        this.elementos.cama + this.elementos.quadro + this.elementos.porta +

                        this.elementos.abajurA + this.elementos.tapeteA + this.elementos.estrelhaA +
                        this.elementos.ursoA + this.elementos.livrosA + this.elementos.macacaA;
                },

                        this.elementos.abajurB + this.elementos.tapeteB + this.elementos.estrelhaB +
                        this.elementos.ursoB + this.elementos.livrosB + this.elementos.macacaB;

            // ══════════════════════════════════════════════════════
            // CENA 1 — PARQUE
            // ══════════════════════════════════════════════════════

                nome: 'Parque',
                elementos: {
                    fundo: `<rect width="480" height="320" fill="#0d1f3a"/>
                   <rect x="0" y="230" width="480" height="90" fill="#0a1e0a"/>

                    // céu

                    // nuvens
                    nuvem1: {

                       <ellipse cx="88"  cy="65" rx="30" ry="20" fill="#1e3a5a"/>

                    // banco
                    banco: `<rect x="188" y="210" width="116" height="10" rx="3" fill="#5a4020"/>

                    // passarinho

                       <ellipse cx="238" cy="165" rx="11" ry="5" fill="#3b82f6" transform="rotate(-10,238,165)"/>`,
                        B: `<ellipse cx="245" cy="162" rx="14" ry="9" fill="#f472b6"/>
                       <circle  cx="255" cy="158" r="7" fill="#f472b6"/>
                       <polygon points="262,158 270,156 262,161" fill="#fbbf24"/>
                       <circle  cx="257" cy="156" r="2" fill="#0a0f1a"/>
                       <ellipse cx="238" cy="165" rx="11" ry="5" fill="#ec4899" transform="rotate(-10,238,165)"/>` },
                    // flores esq
                    florEsq: {
                        A: `<circle cx="155" cy="246" r="6" fill="#fbbf24"/>
                       <ellipse cx="145" cy="241" rx="7" ry="4" fill="#f87171" transform="rotate(-30,145,241)"/>
                       <ellipse cx="165" cy="241" rx="7" ry="4" fill="#f87171" transform="rotate(30,165,241)"/>
                       <ellipse cx="155" cy="235" rx="4" ry="7" fill="#f87171"/>
                       <rect    x="153" y="252"  width="4" height="14" rx="2" fill="#16a34a"/>`,
                        B: `<circle cx="155" cy="246" r="6" fill="#a855f7"/>
                       <ellipse cx="145" cy="241" rx="7" ry="4" fill="#7c3aed" transform="rotate(-30,145,241)"/>
                       <ellipse cx="165" cy="241" rx="7" ry="4" fill="#7c3aed" transform="rotate(30,165,241)"/>
                       <ellipse cx="155" cy="235" rx="4" ry="7" fill="#7c3aed"/>
                       <rect    x="153" y="252"  width="4" height="14" rx="2" fill="#16a34a"/>` },
                    // flores dir

        // ─── ESTADO ───
        let cenaIdx = 0;
        let encontrados = [];
        let inicio = Date.now();

        function setCena(idx, btn) {
            cenaIdx = idx;
            document.querySelectorAll('.nivel-btn').forEach(b => b.classList.remove('ativo'));
            btn.classList.add('ativo');
            novoJogo();
        }

        function novoJogo() {
            encontrados = [];
            inicio = Date.now();
            document.getElementById('win').classList.remove('visivel');
            const b = document.getElementById('banner');
            b.className = 'banner'; b.style.display = 'none';
            document.getElementById('cena-b').querySelectorAll('.marcador').forEach(m => m.remove());

            const cena = CENAS[cenaIdx];
            // Filtra erros únicos por label para o painel (cena do mar tem duplicata intencional de zona)
            const errosUnicos = cena.erros.filter((e, i, arr) => arr.findIndex(x => x.label === e.label) === i);

            document.getElementById('svg-a').innerHTML = cena.svgA();
            document.getElementById('svg-b').innerHTML = cena.svgB();
            document.getElementById('stat-tot').innerHTML = `${errosUnicos.length} <span>erros</span>`;

            const lista = document.getElementById('erros-lista');
            lista.innerHTML = '';
            errosUnicos.forEach((e, i) => {
                const d = document.createElement('div');
                d.className = 'erro-item'; d.id = `ei-${i}`;
                d.innerHTML = `<div class="erro-check"></div><span>${e.label}</span>`;
                lista.appendChild(d);
            });

            atualizarStats(errosUnicos);
        }

        function clicarB(event) {
            const cena = CENAS[cenaIdx];
            const errosUnicos = cena.erros.filter((e, i, arr) => arr.findIndex(x => x.label === e.label) === i);
            const svgEl = document.getElementById('svg-b');
            const rect = svgEl.getBoundingClientRect();
            const rx = 480 / rect.width;
            const ry = 320 / rect.height;
            const cx = (event.clientX - rect.left) * rx;
            const cy = (event.clientY - rect.top) * ry;

            let acertou = false;
            // Verifica contra TODOS os erros (inclui zonas duplicadas)
            cena.erros.forEach((e) => {
                const labelIdx = errosUnicos.findIndex(u => u.label === e.label);
                if (encontrados.includes(labelIdx)) return;
                const dist = Math.sqrt((cx - e.cx) ** 2 + (cy - e.cy) ** 2);
                if (dist <= e.r + 12) {
                    encontrados.push(labelIdx);
                    acertou = true;
                    adicionarMarcador(event);
                    const item = document.getElementById(`ei-${labelIdx}`);
                    if (item) { item.classList.add('encontrado'); item.querySelector('.erro-check').textContent = '✓'; }
                    atualizarStats(errosUnicos);
                    banner(`✅ Encontrou! — ${e.label}`, 'ok');
                    if (encontrados.length === errosUnicos.length) setTimeout(vitoria, 700);
                }
            });

            if (!acertou) banner('❌ Não é aqui... tente em outro lugar!', 'err');
        }

        function adicionarMarcador(event) {
            const cenaEl = document.getElementById('cena-b');
            const rect = cenaEl.getBoundingClientRect();
            const m = document.createElement('div');
            m.className = 'marcador';
            m.style.left = (event.clientX - rect.left) + 'px';
            m.style.top = (event.clientY - rect.top) + 'px';
            cenaEl.appendChild(m);
        }

        function atualizarStats(errosUnicos) {
            if (!errosUnicos) {
                const cena = CENAS[cenaIdx];
                errosUnicos = cena.erros.filter((e, i, arr) => arr.findIndex(x => x.label === e.label) === i);
            }
            document.getElementById('stat-enc').innerHTML = `${encontrados.length} <span>encontrados</span>`;
            document.getElementById('stat-tot').innerHTML = `${errosUnicos.length} <span>erros</span>`;
        }

        function dica() {
            const cena = CENAS[cenaIdx];
            const errosUnicos = cena.erros.filter((e, i, arr) => arr.findIndex(x => x.label === e.label) === i);
            const restantes = errosUnicos.filter((_, i) => !encontrados.includes(i));
            if (restantes.length === 0) return;
            banner(`💡 Dica: olhe para — ${restantes[0].label}`, 'ok');
        }

        function vitoria() {
            document.getElementById('win-t').textContent = Math.round((Date.now() - inicio) / 1000);
            document.getElementById('win').classList.add('visivel');
        }

        function banner(txt, tipo) {
            const b = document.getElementById('banner');
            b.textContent = txt; b.className = `banner ${tipo}`; b.style.display = 'block';
            clearTimeout(b._t); b._t = setTimeout(() => { b.style.display = 'none'; }, 2400);
        }

        novoJogo();
    </script>
