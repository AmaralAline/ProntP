<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolha da Respiração — ProntPsi</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body {
  font-family: 'Nunito', sans-serif;
  background: #0a0f1a;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px; overflow: hidden;
}

.titulo { font-size: 22px; font-weight: 900; color: #c4b5fd; margin-bottom: 6px; text-align: center; }
.subtitulo { font-size: 13px; color: #475569; margin-bottom: 32px; text-align: center; }

.arena {
  position: relative;
  width: 280px; height: 280px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
}

.anel-externo {
  position: absolute;
  width: 100%; height: 100%;
  border-radius: 50%;
  border: 2px dashed rgba(139,92,246,0.2);
}

.bolha {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, rgba(196,181,253,0.9), rgba(124,58,237,0.7));
  box-shadow: 0 0 30px rgba(139,92,246,0.4), inset 0 0 20px rgba(255,255,255,0.15);
  transition: all 0.1s linear;
  position: relative;
  z-index: 2;
}
.bolha::after {
  content: '';
  position: absolute;
  top: 15%; left: 20%;
  width: 28%; height: 18%;
  background: rgba(255,255,255,0.35);
  border-radius: 50%;
  transform: rotate(-30deg);
}

.instrucao-texto {
  font-size: 22px; font-weight: 900; color: #e2e8f0;
  text-align: center; margin-bottom: 6px; min-height: 32px;
  transition: all 0.3s;
}
.instrucao-sub {
  font-size: 14px; color: #7c3aed; font-weight: 700;
  text-align: center; margin-bottom: 24px; min-height: 22px;
}

.barra-ciclo {
  width: 260px;
  background: #141d2b;
  border-radius: 10px;
  height: 8px;
  margin-bottom: 24px;
  overflow: hidden;
}
.barra-ciclo-fill {
  height: 100%;
  background: linear-gradient(90deg, #7c3aed, #c4b5fd);
  border-radius: 10px;
  transition: width 0.1s linear;
  width: 0%;
}

.controles { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }

.btn-play {
  background: #7c3aed; border: none; border-radius: 50%;
  width: 56px; height: 56px; font-size: 20px;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.btn-play:hover { background: #6d28d9; transform: scale(1.07); }

.btn-ritmo {
  background: #1a2332; border: 1px solid rgba(139,92,246,0.25);
  border-radius: 8px; padding: 7px 14px; font-size: 12px;
  font-weight: 700; color: #64748b; cursor: pointer;
  font-family: 'Nunito', sans-serif; transition: all 0.2s;
}
.btn-ritmo.ativo { background: rgba(139,92,246,0.15); border-color: #7c3aed; color: #c4b5fd; }
.btn-ritmo:hover:not(.ativo) { color: #94a3b8; }

.ciclo-conta {
  font-size: 12px; color: #334155; margin-top: 16px; text-align: center;
}
.ciclo-conta span { color: #7c3aed; font-weight: 800; }
</style>
</head>
<body>

<div class="titulo">🫧 Bolha da Respiração</div>
<div class="subtitulo">Respire junto com a bolha e fique mais calmo</div>

<div class="arena">
  <div class="anel-externo"></div>
  <div class="bolha" id="bolha"></div>
</div>

<div class="instrucao-texto" id="instrucao-texto">Pronto para respirar?</div>
<div class="instrucao-sub" id="instrucao-sub">Escolha um ritmo e pressione play</div>

<div class="barra-ciclo"><div class="barra-ciclo-fill" id="barra"></div></div>

<div class="controles">
  <button class="btn-ritmo ativo" onclick="setRitmo('4-4-4', this)">4-4-4 (Básico)</button>
  <button class="btn-ritmo" onclick="setRitmo('4-7-8', this)">4-7-8 (Relaxar)</button>
  <button class="btn-ritmo" onclick="setRitmo('3-3-3', this)">3-3-3 (Rápido)</button>
  <button class="btn-play" id="btn-play" onclick="togglePlay()">▶</button>
</div>

<div class="ciclo-conta" id="ciclo-conta">Ciclos: <span id="ciclos">0</span></div>

<script>
const RITMOS = {
  '4-4-4': { inspirar:4, segurar:4, expirar:4, label:'Básico' },
  '4-7-8': { inspirar:4, segurar:7, expirar:8, label:'Relaxar' },
  '3-3-3': { inspirar:3, segurar:3, expirar:3, label:'Rápido' },
};

const FASES = [
  { nome:'INSPIRE', cor:'#c4b5fd', bgBolha:'radial-gradient(circle at 35% 35%, rgba(196,181,253,0.95), rgba(124,58,237,0.8))', chave:'inspirar' },
  { nome:'SEGURE', cor:'#fbbf24', bgBolha:'radial-gradient(circle at 35% 35%, rgba(253,230,138,0.95), rgba(217,119,6,0.8))', chave:'segurar' },
  { nome:'EXPIRE', cor:'#6ee7b7', bgBolha:'radial-gradient(circle at 35% 35%, rgba(110,231,183,0.95), rgba(5,150,105,0.8))', chave:'expirar' },
];

let ritmo = '4-4-4';
let ativo = false;
let faseAtual = 0;
let progresso = 0;
let ciclos = 0;
let raf = null;
let ultimoTick = null;

function setRitmo(r, btn) {
  ritmo = r;
  document.querySelectorAll('.btn-ritmo').forEach(b => b.classList.remove('ativo'));
  btn.classList.add('ativo');
  if (ativo) { parar(); }
}

function togglePlay() {
  if (ativo) parar();
  else iniciar();
}

function iniciar() {
  ativo = true;
  faseAtual = 0; progresso = 0;
  document.getElementById('btn-play').textContent = '⏸';
  tick(performance.now());
}

function parar() {
  ativo = false;
  cancelAnimationFrame(raf);
  document.getElementById('btn-play').textContent = '▶';
  document.getElementById('instrucao-texto').textContent = 'Pausado';
  document.getElementById('instrucao-sub').textContent = 'Pressione play para continuar';
  document.getElementById('barra').style.width = '0%';
  ultimoTick = null;
}

function tick(ts) {
  if (!ativo) return;
  if (!ultimoTick) ultimoTick = ts;
  const delta = (ts - ultimoTick) / 1000;
  ultimoTick = ts;

  const cfg = RITMOS[ritmo];
  const fase = FASES[faseAtual];
  const duracao = cfg[fase.chave];

  progresso += delta / duracao;
  if (progresso >= 1) {
    progresso = 0;
    faseAtual = (faseAtual + 1) % 3;
    if (faseAtual === 0) {
      ciclos++;
      document.getElementById('ciclos').textContent = ciclos;
    }
  }

  renderizar(progresso, faseAtual);
  raf = requestAnimationFrame(tick);
}

function renderizar(prog, fIdx) {
  const fase = FASES[fIdx];
  const cfg = RITMOS[ritmo];
  const bolha = document.getElementById('bolha');
  const instrTxt = document.getElementById('instrucao-texto');
  const instrSub = document.getElementById('instrucao-sub');
  const barra = document.getElementById('barra');

  // Tamanho da bolha
  let tamanho;
  if (fIdx === 0) { // inspirar — cresce
    tamanho = 80 + prog * 120;
  } else if (fIdx === 1) { // segurar — mantém
    tamanho = 200;
  } else { // expirar — encolhe
    tamanho = 200 - prog * 120;
  }

  bolha.style.width = tamanho + 'px';
  bolha.style.height = tamanho + 'px';
  bolha.style.background = fase.bgBolha;
  bolha.style.boxShadow = `0 0 ${20+tamanho/4}px rgba(139,92,246,0.35), inset 0 0 20px rgba(255,255,255,0.12)`;

  instrTxt.textContent = fase.nome;
  instrTxt.style.color = fase.cor;

  const restante = Math.ceil((1 - prog) * cfg[fase.chave]);
  instrSub.textContent = `${restante} segundo${restante !== 1 ? 's' : ''}`;

  barra.style.width = (prog * 100) + '%';
  barra.style.background = fIdx === 0
    ? 'linear-gradient(90deg, #7c3aed, #c4b5fd)'
    : fIdx === 1
    ? 'linear-gradient(90deg, #d97706, #fbbf24)'
    : 'linear-gradient(90deg, #059669, #6ee7b7)';
}
</script>
</body>
</html>
