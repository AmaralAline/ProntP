<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento de Pacote — ProntPsi</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Roboto', sans-serif; background: #0a0f1a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #111827; border: 1px solid rgba(139,92,246,0.2); border-radius: 16px; padding: 36px; width: 100%; max-width: 480px; }
        .logo { font-size: 13px; color: #8b5cf6; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
        h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
        .prof { font-size: 14px; color: #64748b; margin-bottom: 24px; }
        .destaque { background: #1a2332; border-left: 4px solid #7c3aed; border-radius: 8px; padding: 18px 20px; margin-bottom: 24px; }
        .destaque p { font-size: 13px; color: #94a3b8; margin-bottom: 4px; }
        .destaque .valor { font-size: 28px; font-weight: 700; color: #34d399; margin-top: 10px; }
        .field { margin-bottom: 14px; }
        .field label { font-size: 12px; color: #64748b; display: block; margin-bottom: 5px; }
        .field input { width: 100%; padding: 11px 14px; background: #0f1621; border: 1px solid rgba(139,92,246,0.2); border-radius: 8px; color: #e2e8f0; font-size: 14px; font-family: 'Roboto', sans-serif; outline: none; transition: border-color .2s; }
        .field input:focus { border-color: rgba(139,92,246,0.5); }
        .btn { width: 100%; padding: 14px; background: #7c3aed; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Roboto', sans-serif; margin-top: 8px; transition: background .2s; }
        .btn:hover { background: #6d28d9; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .erro { color: #f87171; font-size: 13px; margin-top: 10px; display: none; }
        .stripe-badge { text-align: center; margin-top: 16px; font-size: 11px; color: #475569; }
        .cancelado-aviso { background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3); border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; font-size: 13px; color: #fbbf24; display: none; }
    </style>
</head>
<body>
<div class="card">
    <p class="logo">ProntPsi</p>
    <h1 id="pacote-nome">Carregando...</h1>
    <p class="prof" id="prof-nome"></p>

    <div class="cancelado-aviso" id="aviso-cancelado">
        ⚠️ Pagamento cancelado. Você pode tentar novamente abaixo.
    </div>

    <div class="destaque" id="info-pacote" style="display:none;">
        <p id="pacote-descricao"></p>
        <p id="pacote-sessoes" style="color:#a78bfa;margin-top:6px;font-weight:500;"></p>
        <div class="valor" id="pacote-valor"></div>
    </div>

    <div id="form-pagamento">
        <div class="field">
            <label>Seu nome completo *</label>
            <input type="text" id="pag-nome" placeholder="Maria da Silva">
        </div>
        <div class="field">
            <label>Seu e-mail *</label>
            <input type="email" id="pag-email" placeholder="maria@email.com">
        </div>
        <div class="field">
            <label>Telefone / WhatsApp</label>
            <input type="tel" id="pag-telefone" placeholder="(11) 99999-9999">
        </div>
        <button class="btn" id="btn-pagar" onclick="iniciarPagamento()">
            🔒 Ir para o pagamento seguro
        </button>
        <p class="erro" id="pag-erro"></p>
        <p class="stripe-badge">Pagamento 100% seguro via <strong>Stripe</strong> 🔒</p>
    </div>

    <div id="sem-stripe" style="display:none;text-align:center;padding:20px;">
        <p style="color:#f87171;">Este profissional ainda não configurou os pagamentos online.</p>
    </div>
</div>

<script>
    const API_URL = 'https://prontpsiback-production.up.railway.app';
    const params = new URLSearchParams(window.location.search);
    const pacoteId = params.get('id');

    if (params.get('cancelado') === '1') {
        document.getElementById('aviso-cancelado').style.display = 'block';
    }

    async function carregarPacote() {
        if (!pacoteId) {
            document.getElementById('pacote-nome').textContent = 'Pacote não encontrado.';
            return;
        }
        try {
            const res = await fetch(`${API_URL}/api/pacotes/${pacoteId}/link`);
            const data = await res.json();
            if (!res.ok) { document.getElementById('pacote-nome').textContent = 'Pacote não encontrado.'; return; }
            document.getElementById('pacote-nome').textContent = data.nome;
            document.getElementById('prof-nome').textContent = `Com ${data.prof_nome}`;
            if (data.descricao) document.getElementById('pacote-descricao').textContent = data.descricao;
            document.getElementById('pacote-sessoes').textContent = `📅 ${data.num_sessoes} sessão${data.num_sessoes > 1 ? 'ões' : ''}`;
            document.getElementById('pacote-valor').textContent = `R$ ${parseFloat(data.valor).toFixed(2)}`;
            document.getElementById('info-pacote').style.display = 'block';
            document.title = `${data.nome} — ProntPsi`;
            if (!data.tem_stripe) {
                document.getElementById('form-pagamento').style.display = 'none';
                document.getElementById('sem-stripe').style.display = 'block';
            }
        } catch (err) {
            document.getElementById('pacote-nome').textContent = 'Erro ao carregar pacote.';
        }
    }

    async function iniciarPagamento() {
        const nome = document.getElementById('pag-nome').value.trim();
        const email = document.getElementById('pag-email').value.trim();
        const telefone = document.getElementById('pag-telefone').value.trim();
        const erro = document.getElementById('pag-erro');
        const btn = document.getElementById('btn-pagar');

        if (!nome || !email) {
            erro.textContent = '⚠️ Preencha seu nome e e-mail para continuar.';
            erro.style.display = 'block';
            return;
        }
        erro.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Aguarde, redirecionando...';

        try {
            const res = await fetch(`${API_URL}/api/pacotes/${pacoteId}/checkout`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paciente_nome: nome, paciente_email: email, paciente_telefone: telefone })
            });
            const data = await res.json();
            if (res.ok && data.url) {
                window.location.href = data.url;
            } else {
                erro.textContent = data.erro || 'Erro ao iniciar pagamento. Tente novamente.';
                erro.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '🔒 Ir para o pagamento seguro';
            }
        } catch (err) {
            erro.textContent = 'Erro de conexão. Verifique sua internet e tente novamente.';
            erro.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '🔒 Ir para o pagamento seguro';
        }
    }

    carregarPacote();
</script>
</body>
</html>
