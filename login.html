<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - ProntPsi</title>
    <link rel="stylesheet" href="login.css" />
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="logo.png" alt="logo-img" class="logo-img" />

        </div>
        <form class="login-form" onsubmit="return login(event)">
            <h1>Login</h1>
            <p>Acesse seu painel com segurança</p>

            <input type="email" id="email" placeholder="E-mail" required />
            <input type="password" id="password" placeholder="Senha" required />

            <button class="login" id="Login">Entrar</button>
            <a href="esquecisenha.html">Esqueceu a senha?</a>
            <a href="home.html">Voltar</a>
        </form>
    </div>

    <script src="login.js"></script>
</body>
</html>
