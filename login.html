<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - ProntPsi</title>
    <link rel="stylesheet" href="PainelExclusivo.css" />
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="logo.png" alt="logo-img" class="logo-img" />

        </div>
        <form class="login-form" onsubmit="return login(event)">
            <!-- Aviso do sistema (carregado dinamicamente) -->
            <div id="aviso-sistema" style="display:none; padding:12px 16px; border-radius:8px; margin-bottom:16px; font-size:13px; line-height:1.5; border-left:4px solid;"></div>

            <h1>Login</h1>
            <p>Acesse seu painel com segurança</p>

            <input type="email" id="email" placeholder="E-mail" required />
            <input type="password" id="password" placeholder="Senha" required />

            <button class="login" id="Login">Entrar</button>
            <a href="esquecisenha.html">Esqueceu a senha?</a>
            <a href="home.html">Voltar</a>
        </form>
    </div>

    <script>
        // Carrega aviso do sistema
        (async () => {
            try {
                const res = await fetch('https://prontpsiback-production.up.railway.app/api/aviso-sistema');
                if (!res.ok) return;
                const aviso = await res.json();
                if (!aviso.ativo || !aviso.mensagem) return;

                const cores = {
                    aviso: { bg: 'rgba(251,191,36,0.08)', border: '#fbbf24', color: '#fbbf24' },
                    erro: { bg: 'rgba(248,113,113,0.08)', border: '#f87171', color: '#f87171' },
                    manutencao: { bg: 'rgba(96,165,250,0.08)', border: '#60a5fa', color: '#60a5fa' },
                    info: { bg: 'rgba(52,211,153,0.08)', border: '#34d399', color: '#34d399' },
                };
                const c = cores[aviso.tipo] || cores.aviso;
                const div = document.getElementById('aviso-sistema');
                div.style.background = c.bg;
                div.style.borderLeftColor = c.border;
                div.style.color = c.color;
                div.textContent = aviso.mensagem;
                div.style.display = 'block';
            } catch (e) {
                // Silencioso — se falhar, login segue normal
            }
        })();
    </script>
    <script src="login.js"></script>
</body>
</html>
