<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário - ProntPsi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #1b2a38;
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background-color: #2a3b4c;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 24px;
        }

            .logo img {
                max-width: 120px;
            }

        h1 {
            font-size: 22px;
            color: #ffffff;
            text-align: center;
            margin-bottom: 8px;
        }

        .instrucoes {
            color: #aaa;
            font-size: 14px;
            text-align: center;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .question {
            margin-bottom: 28px;
            padding: 16px;
            background: #1b2a38;
            border-radius: 8px;
        }

            .question p {
                font-size: 15px;
                font-weight: 600;
                margin-bottom: 12px;
                color: #e0e0e0;
            }

        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

            .options label {
                background-color: #3a4f63;
                padding: 10px 15px;
                border-radius: 6px;
                cursor: pointer;
                transition: background-color 0.2s;
                font-size: 14px;
            }

                .options label:hover {
                    background-color: #1428a3;
                }

            .options input[type="radio"] {
                display: none;
            }

                .options input[type="radio"]:checked + label {
                    background-color: #1428a3;
                    font-weight: 600;
                }

        textarea {
            width: 100%;
            min-height: 100px;
            background: #3a4f63;
            color: #fff;
            border: 1px solid #4a6080;
            border-radius: 6px;
            padding: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            resize: vertical;
        }

            textarea:focus {
                outline: none;
                border-color: #1428a3;
            }

        .btn-enviar {
            width: 100%;
            background: #4a90a4;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

            .btn-enviar:hover {
                background: #357a8a;
            }

            .btn-enviar:disabled {
                background: #555;
                cursor: not-allowed;
            }

        #feedback {
            display: none;
            text-align: center;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 16px;
        }

        #loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px 15px;
            }

            h1 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="logo.png" alt="ProntPsi" onerror="this.style.display='none'">
        </div>

        <div id="loading">
            <p>⏳ Carregando formulário...</p>
        </div>

        <div id="conteudo" style="display:none;">
            <h1 id="titulo-escala"></h1>
            <p class="instrucoes" id="instrucoes-escala"></p>
            <div id="perguntas"></div>
            <button class="btn-enviar" id="btn-enviar" onclick="enviarRespostas()">
                Enviar Respostas
            </button>
        </div>

        <div id="feedback"></div>
    </div>

    <script>
        const API_URL = 'https://prontpsiback-production.up.railway.app';

        // Pega o token da URL
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        let dadosFormulario = null;

        // ============================================================
        //  CARREGA O FORMULÁRIO
        // ============================================================
        async function carregarFormulario() {
            if (!token) {
                mostrarErro('Link inválido. Solicite um novo link ao seu profissional.');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/api/questionario/${token}`);
                const data = await res.json();

                if (!res.ok) {
                    mostrarErro(data.erro || 'Link inválido ou expirado.');
                    return;
                }

                dadosFormulario = data;
                renderizarFormulario(data);

            } catch (err) {
                mostrarErro('Erro ao carregar o formulário. Tente novamente mais tarde.');
            }
        }

        // ============================================================
        //  RENDERIZA AS PERGUNTAS
        // ============================================================
        function renderizarFormulario(data) {
            document.getElementById('titulo-escala').textContent = data.escala_nome;
            document.getElementById('instrucoes-escala').textContent = data.instrucoes || '';

            const container = document.getElementById('perguntas');
            container.innerHTML = '';

            data.perguntas.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'question';

                if ((p.tipo === 'multipla_escolha' || p.tipo === 'escala_numerica') && p.opcoes?.length) {
                    div.innerHTML = `
                                <p>${i + 1}. ${p.texto}</p>
                                <div class="options">
                                    ${p.opcoes.map(o => `
                                        <input type="radio" name="p${p.id}" id="p${p.id}-o${o.id}" value="${o.id}" data-valor="${o.valor}">
                                        <label for="p${p.id}-o${o.id}">${o.texto}</label>
                                    `).join('')}
                                </div>
                            `;
                } else {
                    div.innerHTML = `
                                <p>${i + 1}. ${p.texto}</p>
                                <textarea name="p${p.id}" id="txt-p${p.id}" placeholder="Escreva sua resposta aqui..."></textarea>
                            `;
                }

                container.appendChild(div);
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('conteudo').style.display = 'block';
        }

        // ============================================================
        //  ENVIA AS RESPOSTAS
        // ============================================================
        async function enviarRespostas() {
            if (!dadosFormulario) return;

            const respostas = [];

            for (const p of dadosFormulario.perguntas) {
                if ((p.tipo === 'multipla_escolha' || p.tipo === 'escala_numerica') && p.opcoes?.length) {
                    const selecionado = document.querySelector(`input[name="p${p.id}"]:checked`);
                    if (!selecionado) {
                        alert(`Por favor, responda a pergunta ${dadosFormulario.perguntas.indexOf(p) + 1}.`);
                        return;
                    }
                    respostas.push({
                        pergunta_id: p.id,
                        opcao_id: parseInt(selecionado.value),
                        resposta_texto: null
                    });
                } else {
                    const textarea = document.getElementById(`txt-p${p.id}`);
                    respostas.push({
                        pergunta_id: p.id,
                        opcao_id: null,
                        resposta_texto: textarea?.value.trim() || ''
                    });
                }
            }

            const btn = document.getElementById('btn-enviar');
            btn.disabled = true;
            btn.textContent = 'Enviando...';

            try {
                const res = await fetch(`${API_URL}/api/questionario/${token}/responder`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ respostas })
                });

                const data = await res.json();

                if (res.ok) {
                    document.getElementById('conteudo').style.display = 'none';
                    const feedback = document.getElementById('feedback');
                    feedback.style.display = 'block';
                    feedback.style.backgroundColor = '#1b4332';
                    feedback.style.color = '#4caf80';
                    feedback.innerHTML = `
                                <h2>✅ Respostas enviadas com sucesso!</h2>
                                <p style="margin-top:12px; color:#aaa;">
                                    Obrigado por responder. Seu profissional já pode visualizar suas respostas.
                                </p>
                            `;
                } else {
                    alert(data.erro || 'Erro ao enviar respostas.');
                    btn.disabled = false;
                    btn.textContent = 'Enviar Respostas';
                }

            } catch (err) {
                alert('Erro de conexão. Tente novamente.');
                btn.disabled = false;
                btn.textContent = 'Enviar Respostas';
            }
        }

        // ============================================================
        //  MOSTRA ERRO
        // ============================================================
        function mostrarErro(msg) {
            document.getElementById('loading').style.display = 'none';
            const feedback = document.getElementById('feedback');
            feedback.style.display = 'block';
            feedback.style.backgroundColor = '#3b1a1a';
            feedback.style.color = '#e57373';
            feedback.innerHTML = `
                        <h2>❌ Link inválido</h2>
                        <p style="margin-top:12px; color:#aaa;">${msg}</p>
                    `;
        }

        // Inicia carregamento
        carregarFormulario();
    </script>
</body>
</html>
