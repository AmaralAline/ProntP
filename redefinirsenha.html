<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redefinir senha - ProntPsi</title>
    <link rel="stylesheet" href="login.css" />
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="logo.png" alt="logo-img" class="logo-img" />
        </div>
        <form class="login-form" id="redefinirForm">
            <h1>Redefinir senha</h1>
            <p>Digite sua nova senha abaixo.</p>
            <input type="password" id="novaSenha" placeholder="Nova senha (mín. 6 caracteres)" required />
            <input type="password" id="confirmaSenha" placeholder="Confirme a nova senha" required />
            <p id="spnErro" style="display:none;"></p>
            <button type="submit" id="btnRedefinir">Salvar nova senha</button>
        </form>
    </div>
    <script>
        const API_URL = 'https://prontpsiback-production.up.railway.app';

        // Pega o token da URL
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        // Valida o token ao carregar a página
        if (!token) {
            exibirMensagem('Link inválido. Solicite um novo.', 'erro');
            document.getElementById('redefinirForm').style.display = 'none';
        } else {
            fetch(`${API_URL}/api/auth/validar-token/${token}`)
                .then(res => res.json())
                .then(data => {
                    if (!data.valido) {
                        exibirMensagem('Link inválido ou expirado. Solicite um novo.', 'erro');
                        document.getElementById('redefinirForm').style.display = 'none';
                    }
                })
                .catch(() => {
                    exibirMensagem('Erro de conexão.', 'erro');
                });
        }

        document.getElementById('redefinirForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const novaSenha = document.getElementById('novaSenha').value.trim();
            const confirmaSenha = document.getElementById('confirmaSenha').value.trim();
            const btnRedefinir = document.getElementById('btnRedefinir');

            if (novaSenha !== confirmaSenha) {
                exibirMensagem('As senhas não coincidem.', 'erro');
                return;
            }

            if (novaSenha.length < 6) {
                exibirMensagem('A senha deve ter no mínimo 6 caracteres.', 'erro');
                return;
            }

            btnRedefinir.disabled = true;
            btnRedefinir.innerText = 'Salvando...';

            try {
                const res = await fetch(`${API_URL}/api/auth/redefinir-senha`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, nova_senha: novaSenha })
                });

                const data = await res.json();

                if (res.ok) {
                    exibirMensagem(data.mensagem, 'sucesso');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2500);
                } else {
                    exibirMensagem(data.erro || 'Erro ao redefinir senha.', 'erro');
                }

            } catch (err) {
                exibirMensagem('Erro de conexão com o servidor.', 'erro');
            } finally {
                btnRedefinir.disabled = false;
                btnRedefinir.innerText = 'Salvar nova senha';
            }
        });

        function exibirMensagem(msg, tipo) {
            const el = document.getElementById('spnErro');
            el.innerText = msg;
            el.style.display = 'block';
            el.style.padding = '10px';
            el.style.borderRadius = '6px';
            el.style.marginTop = '10px';
            el.style.textAlign = 'center';
            el.style.backgroundColor = tipo === 'sucesso' ? '#d4edda' : '#f8d7da';
            el.style.color = tipo === 'sucesso' ? '#155724' : '#721c24';
        }
    </script>
</body>
</html>
