<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunicação com Voz</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #e8f4fd;
            margin: 0;
            padding: 8px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 20px;
            margin: 5px 0;
            flex-shrink: 0;
        }

        #output {
            width: 100%;
            height: 100px;
            margin: 8px 0;
            padding: 10px;
            border: 2px solid #666;
            font-size: 26px;
            white-space: pre-wrap;
            background-color: white;
            flex-shrink: 0;
            resize: none;
        }

        #suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 8px 0;
            padding: 10px;
            background-color: #f9f9f9;
            border: 1px solid #ccc;
            max-height: 100px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .suggestion {
            background-color: #bbdefb;
            padding: 10px 15px;
            font-size: 22px;
            border-radius: 10px;
            cursor: pointer;
            min-width: 100px;
        }

            .suggestion:hover {
                background-color: #90caf9;
            }

        #speak {
            background-color: #4CAF50;
            color: white;
            font-size: 32px;
            padding: 15px;
            margin: 8px 0;
            width: 100%;
            border: none;
            cursor: pointer;
            flex-shrink: 0;
        }

            #speak:hover {
                background-color: #45a049;
            }

        .keyboard {
            flex-grow: 1;
            overflow-y: auto;
            padding: 5px 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .key {
            position: relative;
            background-color: #fff;
            border: 2px solid #666;
            padding: 12px;
            font-size: 26px;
            cursor: pointer;
            min-width: 50px;
            height: 60px;
            flex: 1 1 50px;
            max-width: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            .key:hover {
                background-color: #ccc;
            }

            .key .tooltip {
                visibility: hidden;
                position: absolute;
                bottom: 100%;
                left: 50%;
                transform: translateX(-50%);
                background-color: #333;
                color: white;
                padding: 5px 10px;
                border-radius: 6px;
                font-size: 16px;
                white-space: nowrap;
                z-index: 10;
                opacity: 0;
                transition: opacity 0.3s;
            }

            .key:hover .tooltip {
                visibility: visible;
                opacity: 1;
            }

        .special {
            min-width: 100px;
            max-width: none;
            flex: 1 1 100px;
            background-color: #ffeb3b;
            font-weight: bold;
            font-size: 22px;
        }

        .emoji-key {
            font-size: 38px;
            min-width: 65px;
            height: 65px;
            flex: 1 1 65px;
        }

        .numbers-row {
            order: -1;
        }

        .special-row {
            order: 10;
        }
    </style>
</head>
<body>
    <h1>Comunicação com Voz</h1>
    <textarea id="output" readonly>Escreva aqui...</textarea>

    <div id="suggestions"></div>

    <button id="speak">FALAR</button>

    <div class="keyboard">
        <!-- Letras, acentos, números, emojis e especiais (mesmo do anterior) -->
        <div class="row">
            <div class="key" onclick="addLetter('A')">A</div>
            <div class="key" onclick="addLetter('B')">B</div>
            <div class="key" onclick="addLetter('C')">C</div>
            <div class="key" onclick="addLetter('D')">D</div>
            <div class="key" onclick="addLetter('E')">E</div>
            <div class="key" onclick="addLetter('F')">F</div>
            <div class="key" onclick="addLetter('G')">G</div>
            <div class="key" onclick="addLetter('H')">H</div>
            <div class="key" onclick="addLetter('I')">I</div>
        </div>
        <div class="row">
            <div class="key" onclick="addLetter('J')">J</div>
            <div class="key" onclick="addLetter('K')">K</div>
            <div class="key" onclick="addLetter('L')">L</div>
            <div class="key" onclick="addLetter('M')">M</div>
            <div class="key" onclick="addLetter('N')">N</div>
            <div class="key" onclick="addLetter('O')">O</div>
            <div class="key" onclick="addLetter('P')">P</div>
            <div class="key" onclick="addLetter('Q')">Q</div>
            <div class="key" onclick="addLetter('R')">R</div>
        </div>
        <div class="row">
            <div class="key" onclick="addLetter('S')">S</div>
            <div class="key" onclick="addLetter('T')">T</div>
            <div class="key" onclick="addLetter('U')">U</div>
            <div class="key" onclick="addLetter('V')">V</div>
            <div class="key" onclick="addLetter('W')">W</div>
            <div class="key" onclick="addLetter('X')">X</div>
            <div class="key" onclick="addLetter('Y')">Y</div>
            <div class="key" onclick="addLetter('Z')">Z</div>
            <div class="key" onclick="addLetter('Ç')">Ç</div>
        </div>
        <div class="row">
            <div class="key" onclick="addLetter('Á')">Á</div>
            <div class="key" onclick="addLetter('É')">É</div>
            <div class="key" onclick="addLetter('Í')">Í</div>
            <div class="key" onclick="addLetter('Ó')">Ó</div>
            <div class="key" onclick="addLetter('Ú')">Ú</div>
            <div class="key" onclick="addLetter('Ã')">Ã</div>
            <div class="key" onclick="addLetter('Õ')">Õ</div>
        </div>
        <div class="row numbers-row">
            <div class="key" onclick="addLetter('0')">0</div>
            <div class="key" onclick="addLetter('1')">1</div>
            <div class="key" onclick="addLetter('2')">2</div>
            <div class="key" onclick="addLetter('3')">3</div>
            <div class="key" onclick="addLetter('4')">4</div>
            <div class="key" onclick="addLetter('5')">5</div>
            <div class="key" onclick="addLetter('6')">6</div>
            <div class="key" onclick="addLetter('7')">7</div>
            <div class="key" onclick="addLetter('8')">8</div>
            <div class="key" onclick="addLetter('9')">9</div>
        </div>
        <div class="row">
            <div class="key emoji-key" onclick="addEmoji('😊', 'feliz')"><span class="tooltip">Feliz</span>😊</div>
            <div class="key emoji-key" onclick="addEmoji('😢', 'triste')"><span class="tooltip">Triste</span>😢</div>
            <div class="key emoji-key" onclick="addEmoji('😟', 'ansiosa')"><span class="tooltip">Ansiosa</span>😟</div>
            <div class="key emoji-key" onclick="addEmoji('🤔', 'confusa')"><span class="tooltip">Confusa</span>🤔</div>
            <div class="key emoji-key" onclick="addEmoji('🤢', 'sentindo me mal')"><span class="tooltip">Sentindo-se mal</span>🤢</div>
            <div class="key emoji-key" onclick="addEmoji('🙏', 'obrigada')"><span class="tooltip">Obrigada</span>🙏</div>
            <div class="key emoji-key" onclick="addEmoji('👌', 'ok')"><span class="tooltip">OK</span>👌</div>
            <div class="key emoji-key" onclick="addEmoji('❌', 'não')"><span class="tooltip">Não</span>❌</div>
            <div class="key emoji-key" onclick="addEmoji('✅', 'sim')"><span class="tooltip">Sim</span>✅</div>
            <div class="key emoji-key" onclick="addEmoji('🆘', 'ajuda')"><span class="tooltip">Ajuda</span>🆘</div>
            <div class="key emoji-key" onclick="addEmoji('😍', 'adorando')"><span class="tooltip">Adorando</span>😍</div>
            <div class="key emoji-key" onclick="addEmoji('😂', 'rindo')"><span class="tooltip">Rindo</span>😂</div>
            <div class="key emoji-key" onclick="addEmoji('🤗', 'abraço')"><span class="tooltip">Abraço</span>🤗</div>
            <div class="key emoji-key" onclick="addEmoji('❤️', 'amor')"><span class="tooltip">Amor</span>❤️</div>
        </div>
        <div class="row special-row">
            <div class="key special" onclick="addLetter(' ')">Espaço</div>
            <div class="key special" onclick="backspace()">Apagar</div>
            <div class="key special" onclick="addLetter('\n')">Enter</div>
            <div class="key special" onclick="clearText()">Limpar Tudo</div>
        </div>
    </div>

    <script>
        const output = document.getElementById('output');
        const suggestionsDiv = document.getElementById('suggestions');
        const speakButton = document.getElementById('speak');

        let textToSpeak = '';

        const commonWords = [
            "sim", "não", "obrigada", "por favor", "ajuda", "dor", "água", "banheiro", "fome", "sede",
            "cansada", "feliz", "triste", "ansiosa", "médico", "família", "casa", "oi", "tchau", "bom dia",
            "boa noite", "estou bem", "não estou bem", "quero", "não quero", "mais", "menos", "calor", "frio", "sono",
            "acordada", "televisão", "música", "janela", "porta", "luz", "escuro", "confortável", "desconfortável", "coceira",
            "dor de cabeça", "dor no peito", "dor na barriga", "respirar", "tosse", "vomitar", "remédio", "enfermeira", "psicóloga", "visita",
            "telefone", "foto", "abraço", "beijo",
        ];

        function updateSuggestions() {
            suggestionsDiv.innerHTML = '';
            const text = output.value.trim();
            if (text === '' || text === 'Escreva aqui...') {
                // Mostra as mais comuns
                commonWords.slice(0, 15).forEach(word => addSuggestion(word));
                return;
            }

            // Pega a última palavra incompleta
            const words = text.split(/\s+/);
            const lastWord = words[words.length - 1].toLowerCase();

            const matches = commonWords
                .filter(word => word.toLowerCase().startsWith(lastWord))
                .slice(0, 10);

            matches.forEach(word => addSuggestion(word));
        }

        function addSuggestion(word) {
            const btn = document.createElement('div');
            btn.className = 'suggestion';
            btn.textContent = word;
            btn.onclick = () => completeWord(word);
            suggestionsDiv.appendChild(btn);
        }

        function completeWord(word) {
            let text = output.value.trim();
            const parts = text.split(/\s+/);
            parts.pop(); // Remove última palavra incompleta
            parts.push(word);
            output.value = parts.join(' ') + ' ';
            textToSpeak = output.value; // Atualiza texto falado (simples)
            output.scrollTop = output.scrollHeight;
            updateSuggestions();
        }

        function addLetter(letter) {
            if (output.value === 'Escreva aqui...') {
                output.value = '';
                textToSpeak = '';
            }
            output.value += letter;
            textToSpeak += letter;
            output.scrollTop = output.scrollHeight;
            updateSuggestions();
        }

        function addEmoji(visual, spoken) {
            if (output.value === 'Escreva aqui...') {
                output.value = '';
                textToSpeak = '';
            }
            output.value += visual + ' ';
            textToSpeak += spoken + ' ';
            output.scrollTop = output.scrollHeight;
            updateSuggestions();
        }

        function backspace() {
            output.value = output.value.slice(0, -1);
            textToSpeak = textToSpeak.slice(0, -1);
            updateSuggestions();
        }

        function clearText() {
            output.value = '';
            textToSpeak = '';
            updateSuggestions();
        }

        function speak() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let text = textToSpeak.trim();
                if (text === '') text = 'Nada para falar.';
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'pt-BR';
                utterance.rate = 0.9;
                utterance.pitch = 1.2;
                utterance.volume = 1;

                const voices = window.speechSynthesis.getVoices();
                const femaleVoice = voices.find(v =>
                    v.lang === 'pt-BR' &&
                    (v.name.toLowerCase().includes('female') ||
                        v.name.toLowerCase().includes('wavenet-a') ||
                        v.name.toLowerCase().includes('standard-a') ||
                        v.name.includes('A'))
                );
                if (femaleVoice) utterance.voice = femaleVoice;
                else {
                    const ptVoice = voices.find(v => v.lang === 'pt-BR');
                    if (ptVoice) utterance.voice = ptVoice;
                }

                window.speechSynthesis.speak(utterance);
            } else {
                alert('Desculpe, seu navegador não suporta síntese de voz.');
            }
        }

        speakButton.onclick = speak;
        updateSuggestions(); // Inicial

        window.speechSynthesis.onvoiceschanged = function () { };
    </script>
</body>
</html>
