<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memória das Emoções — ProntPsi</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: #0a0f1a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .topo {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .topo-titulo {
            font-size: 15px;
            font-weight: 900;
            color: #c4b5fd;
        }

        .topo-sub {
            font-size: 10px;
            color: #334155;
            margin-top: 1px;
        }

        .stats {
            display: flex;
            gap: 6px;
        }

        .stat-pill {
            background: #141d2b;
            border: 1px solid rgba(139,92,246,0.25);
            border-radius: 20px;
            padding: 3px 11px;
            font-size: 11px;
            font-weight: 800;
            color: #c4b5fd;
        }

            .stat-pill span {
                color: #475569;
                font-weight: 400;
                font-size: 10px;
            }

        .nivel-bar {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nivel-label {
            font-size: 10px;
            color: #475569;
        }

        .nivel-btn {
            background: #141d2b;
            border: 1px solid rgba(139,92,246,0.2);
            border-radius: 6px;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: 800;
            color: #64748b;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            transition: all 0.15s;
        }

            .nivel-btn.ativo {
                background: #3b1f8c;
                border-color: #7c3aed;
                color: #ddd6fe;
            }

            .nivel-btn:hover:not(.ativo) {
                color: #94a3b8;
            }

        .banner {
            text-align: center;
            padding: 5px 10px;
            border-radius: 7px;
            font-size: 12px;
            font-weight: 800;
            display: none;
            background: rgba(52,211,153,0.1);
            border: 1px solid rgba(52,211,153,0.3);
            color: #34d399;
        }

        /* ── CORPO: tabuleiro grande + painel pequeno ── */
        .corpo {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        /* TABULEIRO — ocupa o máximo */
        .tabuleiro {
            display: grid;
            gap: 8px;
            flex: 1; /* cresce */
            min-width: 0;
        }

        /* Carta tamanho fixo */
        .carta-wrap {
            width: 96px;
            height: 116px;
            perspective: 600px;
            cursor: pointer;
            flex-shrink: 0;
        }

            .carta-wrap:hover .carta-inner:not(.virada):not(.par) {
                filter: brightness(1.18);
            }

        .carta-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(.4,0,.2,1);
            border-radius: 12px;
        }

            .carta-inner.virada, .carta-inner.par {
                transform: rotateY(180deg);
            }

        .carta-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid transparent;
        }

        .carta-verso {
            background: linear-gradient(145deg, #1a2540 0%, #221852 100%);
            border-color: rgba(124,58,237,0.55);
            gap: 4px;
        }

        .carta-numero {
            font-size: 30px;
            font-weight: 900;
            color: #a78bfa;
            line-height: 1;
        }

        .carta-verso-dica {
            font-size: 9px;
            color: rgba(139,92,246,0.5);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .carta-frente {
            transform: rotateY(180deg);
            gap: 6px;
            padding: 6px;
        }

            .carta-frente.par-encontrado {
                border-color: #34d399 !important;
                box-shadow: 0 0 16px rgba(52,211,153,0.3);
            }
        /* Emoji GRANDE na frente */
        .carta-emoji {
            font-size: 38px;
            line-height: 1;
        }

        .carta-nome {
            font-size: 11px;
            font-weight: 800;
            text-align: center;
            color: rgba(255,255,255,0.92);
            line-height: 1.2;
            max-width: 90%;
        }

        /* ── PAINEL LATERAL — compacto ── */
        .painel {
            width: 170px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .painel-emocao {
            background: #141d2b;
            border: 1px solid rgba(139,92,246,0.2);
            border-radius: 10px;
            padding: 10px;
        }

        .painel-titulo {
            font-size: 9px;
            color: #7c3aed;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
        }

        .placeholder {
            font-size: 10px;
            color: #334155;
            text-align: center;
            padding: 6px 0;
            line-height: 1.5;
        }

        .detalhe {
            display: none;
            flex-direction: column;
            gap: 5px;
        }

            .detalhe.visivel {
                display: flex;
            }

        .em-nome {
            font-size: 16px;
            font-weight: 900;
            color: #fff;
        }

        .em-desc {
            font-size: 10px;
            color: #64748b;
            line-height: 1.5;
        }

        .em-pergunta {
            font-size: 10px;
            color: #c4b5fd;
            font-weight: 700;
            background: #1a2332;
            padding: 7px 8px;
            border-radius: 7px;
            border-left: 3px solid #7c3aed;
            line-height: 1.6;
        }

        .controles {
            display: flex;
            gap: 6px;
        }

        .btn-p {
            flex: 1;
            background: #7c3aed;
            border: none;
            border-radius: 8px;
            padding: 9px 5px;
            font-size: 11px;
            font-weight: 800;
            color: #fff;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            transition: background 0.15s;
        }

            .btn-p:hover {
                background: #6d28d9;
            }

        .btn-s {
            background: transparent;
            border: 1px solid rgba(139,92,246,0.25);
            border-radius: 8px;
            padding: 9px 10px;
            font-size: 10px;
            font-weight: 800;
            color: #64748b;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            transition: all 0.15s;
        }

            .btn-s:hover {
                border-color: rgba(139,92,246,0.5);
                color: #a78bfa;
            }

        /* WIN */
        #win {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10,15,26,0.97);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            text-align: center;
            padding: 24px;
            z-index: 30;
        }

            #win.visivel {
                display: flex;
            }

        .win-trofeu {
            font-size: 56px;
        }

        .win-titulo {
            font-size: 22px;
            font-weight: 900;
            color: #c4b5fd;
        }

        .win-sub {
            font-size: 13px;
            color: #475569;
        }

        .win-stats {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .win-stat {
            background: #141d2b;
            border: 1px solid rgba(139,92,246,0.2);
            border-radius: 10px;
            padding: 10px 20px;
        }

        .win-stat-val {
            font-size: 22px;
            font-weight: 900;
            color: #c4b5fd;
        }

        .win-stat-lab {
            font-size: 10px;
            color: #475569;
        }
    </style>
</head>
<body>

    <div class="topo">
        <div>
            <div class="topo-titulo">🎴 Memória das Emoções</div>
            <div class="topo-sub">Paciente fala o número — terapeuta clica para virar</div>
        </div>
        <div class="stats">
            <div class="stat-pill" id="stat-pares">0 <span>pares</span></div>
            <div class="stat-pill" id="stat-jogadas">0 <span>jogadas</span></div>
        </div>
    </div>

    <div class="nivel-bar">
        <span class="nivel-label">Nível:</span>
        <button class="nivel-btn ativo" onclick="setNivel('facil',this)">Fácil — 6 cartas</button>
        <button class="nivel-btn" onclick="setNivel('medio',this)">Médio — 12 cartas</button>
        <button class="nivel-btn" onclick="setNivel('dificil',this)">Difícil — 16 cartas</button>
        <button class="nivel-btn" onclick="setNivel('expert',this)">Expert — 20 cartas</button>
    </div>

    <div class="banner" id="banner"></div>

    <div class="corpo">
        <div class="tabuleiro" id="tabuleiro"></div>

        <div class="painel">
            <div class="painel-emocao">
                <div class="painel-titulo">💬 Emoção descoberta</div>
                <div class="placeholder" id="placeholder">Vire um par para ver a pergunta</div>
                <div class="detalhe" id="detalhe">
                    <div class="em-nome" id="det-nome"></div>
                    <div class="em-desc" id="det-desc"></div>
                    <div class="em-pergunta" id="det-pergunta"></div>
                </div>
            </div>
            <div class="controles">
                <button class="btn-p" onclick="novoJogo()">🔀 Novo</button>
                <button class="btn-s" onclick="revelarTodas()">👁 Ver</button>
            </div>
        </div>
    </div>

    <div id="win">
        <div class="win-trofeu">🏆</div>
        <div class="win-titulo">Muito bem!</div>
        <div class="win-sub">Todas as emoções foram descobertas!</div>
        <div class="win-stats">
            <div class="win-stat"><div class="win-stat-val" id="win-j">-</div><div class="win-stat-lab">jogadas</div></div>
            <div class="win-stat"><div class="win-stat-val" id="win-p">-</div><div class="win-stat-lab">pares</div></div>
        </div>
        <button class="btn-p" style="width:180px;padding:10px;" onclick="novoJogo()">🔀 Jogar novamente</button>
    </div>

    <script>
        const EMOCOES = [
            {
                emoji: '😊', nome: 'Alegria', cor: '#fde68a', bg: '#1c1600',
                desc: 'Sentir-se feliz e satisfeito.',
                pergunta: 'Quando você se sentiu assim hoje? O que te deixou alegre?'
            },
            {
                emoji: '😢', nome: 'Tristeza', cor: '#bfdbfe', bg: '#001433',
                desc: 'Uma sensação de perda ou mágoa.',
                pergunta: 'O que costuma te deixar triste? Como você se cuida?'
            },
            {
                emoji: '😠', nome: 'Raiva', cor: '#fca5a5', bg: '#200000',
                desc: 'Sentir-se irritado. A raiva tem uma mensagem.',
                pergunta: 'O que te faz sentir raiva? O que ajuda a acalmar?'
            },
            {
                emoji: '😨', nome: 'Medo', cor: '#c4b5fd', bg: '#12003a',
                desc: 'Sensação de insegurança. O medo nos protege.',
                pergunta: 'De que você tem medo? Quem te ajuda quando está com medo?'
            },
            {
                emoji: '😮', nome: 'Surpresa', cor: '#fdba74', bg: '#1a0f00',
                desc: 'Algo inesperado aconteceu!',
                pergunta: 'Qual foi a última surpresa? Foi boa ou ruim?'
            },
            {
                emoji: '🥰', nome: 'Amor', cor: '#fbcfe8', bg: '#200010',
                desc: 'Carinho quentinho por alguém especial.',
                pergunta: 'Quem você ama muito? Como demonstra esse amor?'
            },
            {
                emoji: '😌', nome: 'Calma', cor: '#6ee7b7', bg: '#001a10',
                desc: 'Sentir-se tranquilo e em paz.',
                pergunta: 'O que te deixa calmo? Como você cria esses momentos?'
            },
            {
                emoji: '🤩', nome: 'Empolgação', cor: '#fef08a', bg: '#181200',
                desc: 'Energia animada para algo emocionante!',
                pergunta: 'O que te deixa empolgado? O que você está animado para fazer?'
            },
            {
                emoji: '😔', nome: 'Frustração', cor: '#fcd34d', bg: '#1a1200',
                desc: 'Quando as coisas não saem como queremos.',
                pergunta: 'Quando você se sentiu frustrado? O que você fez?'
            },
            {
                emoji: '😳', nome: 'Vergonha', cor: '#fda4af', bg: '#200010',
                desc: 'Uma sensação intensa de timidez.',
                pergunta: 'O que te deixa com vergonha? Como você lida com isso?'
            },
        ];

        // colunas por nível e qtd de pares
        const CFG = {
            facil: { qtd: 3, cols: 3 },
            medio: { qtd: 6, cols: 4 },
            dificil: { qtd: 8, cols: 5 },
            expert: { qtd: 10, cols: 5 },
        };

        let nivel = 'facil', cartas = [], viradas = [], pares = [], jogadas = 0, travado = false;

        function embaralhar(a) {
            const r = [...a];
            for (let i = r.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[r[i], r[j]] = [r[j], r[i]]; }
            return r;
        }

        function setNivel(n, btn) {
            nivel = n;
            document.querySelectorAll('.nivel-btn').forEach(b => b.classList.remove('ativo'));
            btn.classList.add('ativo');
            novoJogo();
        }

        function novoJogo() {
            const cfg = CFG[nivel];
            const esc = embaralhar([...EMOCOES]).slice(0, cfg.qtd);
            cartas = embaralhar([...esc, ...esc].map((e, i) => ({ ...e, uid: i })));
            viradas = []; pares = []; jogadas = 0; travado = false;

            atualizarStats();
            document.getElementById('banner').style.display = 'none';
            document.getElementById('placeholder').style.display = 'block';
            document.getElementById('detalhe').classList.remove('visivel');
            document.getElementById('win').classList.remove('visivel');

            const tab = document.getElementById('tabuleiro');
            tab.style.gridTemplateColumns = `repeat(${cfg.cols}, 96px)`;
            tab.innerHTML = '';

            cartas.forEach((carta, idx) => {
                const wrap = document.createElement('div');
                wrap.className = 'carta-wrap';
                wrap.innerHTML = `
          <div class="carta-inner" id="ci-${idx}">
            <div class="carta-face carta-verso">
              <div class="carta-numero">${idx + 1}</div>
              <div class="carta-verso-dica">VIRAR</div>
            </div>
            <div class="carta-face carta-frente" style="background:${carta.bg};border-color:${carta.cor}60;">
              <div class="carta-emoji">${carta.emoji}</div>
              <div class="carta-nome">${carta.nome}</div>
            </div>
          </div>`;
                wrap.addEventListener('click', () => clicar(idx));
                tab.appendChild(wrap);
            });
        }

        function clicar(idx) {
            if (travado || viradas.includes(idx) || pares.includes(idx)) return;
            document.getElementById(`ci-${idx}`).classList.add('virada');
            viradas.push(idx);
            if (viradas.length === 2) {
                jogadas++; travado = true; atualizarStats();
                const [a, b] = viradas;
                if (cartas[a].nome === cartas[b].nome) {
                    setTimeout(() => {
                        [a, b].forEach(i => {
                            document.getElementById(`ci-${i}`).querySelector('.carta-frente').classList.add('par-encontrado');
                            pares.push(i);
                        });
                        mostrarEmocao(cartas[a]);
                        viradas = []; travado = false; atualizarStats();
                        mostrarBanner(`✅ Par encontrado! ${cartas[a].emoji} ${cartas[a].nome}`);
                        if (pares.length === cartas.length) setTimeout(vitoria, 700);
                    }, 350);
                } else {
                    setTimeout(() => {
                        viradas.forEach(i => document.getElementById(`ci-${i}`).classList.remove('virada'));
                        viradas = []; travado = false;
                    }, 1000);
                }
            }
        }

        function mostrarEmocao(e) {
            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('det-nome').textContent = `${e.emoji} ${e.nome}`;
            document.getElementById('det-desc').textContent = e.desc;
            document.getElementById('det-pergunta').textContent = `💬 ${e.pergunta}`;
            document.getElementById('detalhe').classList.add('visivel');
        }

        function atualizarStats() {
            document.getElementById('stat-pares').innerHTML = `${pares.length / 2} <span>pares</span>`;
            document.getElementById('stat-jogadas').innerHTML = `${jogadas} <span>jogadas</span>`;
        }

        function mostrarBanner(txt) {
            const b = document.getElementById('banner');
            b.textContent = txt; b.style.display = 'block';
            clearTimeout(b._t); b._t = setTimeout(() => { b.style.display = 'none'; }, 2200);
        }

        function revelarTodas() {
            cartas.forEach((_, idx) => document.getElementById(`ci-${idx}`).classList.add('virada'));
            travado = true;
        }

        function vitoria() {
            document.getElementById('win-j').textContent = jogadas;
            document.getElementById('win-p').textContent = cartas.length / 2;
            document.getElementById('win').classList.add('visivel');
        }

        novoJogo();
    </script>
</body>
</html>
