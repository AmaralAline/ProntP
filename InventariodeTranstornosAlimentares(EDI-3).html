<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala EDI-3 - ProntPsi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #1b2a38;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            background-color: #2a3b4c;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

            .logo img {
                max-width: 150px;
            }

        h1 {
            font-size: 24px;
            color: #ffffff;
            text-align: center;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 18px;
            color: #6B7280;
            text-align: center;
            margin-bottom: 20px;
        }

        .question {
            margin-bottom: 20px;
        }

            .question p {
                font-size: 16px;
                margin-bottom: 10px;
            }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

            .options label {
                background-color: #6B7280;
                padding: 8px 15px;
                border-radius: 5px;
                cursor: pointer;
                transition: background-color 0.3s;
                font-size: 14px;
            }

                .options label:hover {
                    background-color: #1428a3;
                }

            .options input[type="radio"] {
                display: none;
            }

                .options input[type="radio"]:checked + label {
                    background-color: #1428a3;
                    font-weight: 600;
                }

        .calculate-btn, .reset-btn {
            background-color: #6B7280;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 20px 10px;
            transition: background-color 0.3s;
        }

            .calculate-btn:hover, .reset-btn:hover {
                background-color: #4B5563;
            }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: #1b2a38;
            border-radius: 5px;
            text-align: center;
            font-size: 16px;
            display: none;
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <!-- Substitua pelo caminho real do logo -->
            <img src="logo.png" alt="ProntPsi Logo">
        </div>
        <h1>Escala EDI-3 - Inventário de Transtornos Alimentares</h1>
        <h2>Responda às perguntas abaixo com base em como você se sente geralmente.</h2>

        <div id="form">
            <div id="questions" class="space-y-6"></div>
            <div class="button-container">
                <button class="calculate-btn" onclick="calculateScore()">Calcular Pontuação</button>
                <button class="reset-btn" onclick="resetForm()">Reiniciar</button>
            </div>
            <div id="result"></div>
        </div>
    </div>

    <script>
    // Lista de perguntas representativas do EDI-3 (uma por subescala)
    const questions = [
      { text: "Sinto uma forte necessidade de estar mais magro(a).", subescala: "Impulso para Magreza" },
      { text: "Estou insatisfeito(a) com a forma do meu corpo.", subescala: "Insatisfação Corporal" },
      { text: "Sinto que não sou bom o suficiente.", subescala: "Ineficácia" },
      { text: "Quero que tudo o que faço seja perfeito.", subescala: "Perfeccionismo" },
      { text: "Tenho dificuldade em confiar nos outros.", subescala: "Desconfiança Interpessoal" },
      { text: "Tenho dificuldade em reconhecer minhas emoções.", subescala: "Consciência Interoceptiva" },
      { text: "Tenho medo de me tornar vulnerável emocionalmente.", subescala: "Medo de Maturidade" },
      { text: "Sinto que devo restringir minha alimentação para me sentir bem.", subescala: "Ascetismo" },
      { text: "Sinto-me impulsivo(a) em relação à comida.", subescala: "Impulsividade" },
      { text: "Evito situações sociais por causa do meu peso ou forma.", subescala: "Insegurança Social" },
      { text: "Sinto que minha autoestima depende do meu peso.", subescala: "Autoestima" },
      { text: "Tenho dificuldade em manter relacionamentos próximos.", subescala: "Alienação Interpessoal" }
    ];

    const options = [
      { value: 0, label: "0 - Nunca" },
      { value: 1, label: "1 - Raramente" },
      { value: 2, label: "2 - Às vezes" },
      { value: 3, label: "3 - Frequentemente" },
      { value: 4, label: "4 - Sempre" }
    ];

    // Função para renderizar as perguntas
    function renderQuestions() {
      const questionContainer = document.getElementById('questions');
      questionContainer.innerHTML = '';
      questions.forEach((question, index) => {
        const questionDiv = document.createElement('div');
        questionDiv.className = 'question';
        questionDiv.innerHTML = `
          <p>${index + 1}. ${question.text} (${question.subescala})</p>
          <div class="options">
            ${options.map(option => `
              <input type="radio" name="q${index}" value="${option.value}" id="q${index}-${option.value}" required>
              <label for="q${index}-${option.value}">${option.label}</label>
            `).join('')}
          </div>
        `;
        questionContainer.appendChild(questionDiv);
      });
    }

    // Função para calcular a pontuação
    function calculateScore() {
      const form = document.getElementById('form');
      for (let i = 0; i < questions.length; i++) {
        const selected = form.querySelector(`input[name="q${i}"]:checked`);
        if (!selected) {
          alert('Por favor, responda a todas as perguntas antes de calcular.');
          return;
        }
      }

      let totalScore = 0;
      questions.forEach((_, index) => {
        const selected = form.querySelector(`input[name="q${index}"]:checked`);
        totalScore += parseInt(selected.value);
      });

      const resultDiv = document.getElementById('result');
      let message = `Resultados:\n\n`;
      message += `Pontuação Total: ${totalScore} (de 0 a 48)\n\n`;
      message += totalScore >= 30 ? 'Pontuações altas podem indicar sinais de transtornos alimentares. ' :
                 totalScore >= 15 ? 'As pontuações sugerem alguns sinais que podem precisar de atenção. ' :
                 'As pontuações estão dentro de um intervalo baixo. ';
      message += 'Consulte um profissional de saúde mental para uma avaliação completa.';

      resultDiv.textContent = message;
      resultDiv.style.display = 'block';
    }

    // Função para reiniciar o formulário
    function resetForm() {
      renderQuestions();
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'none';
    }

    // Inicializar o formulário
    renderQuestions();
    </script>
</body>
</html>
