<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala de Ansiedade de Hamilton (HAMA) - ProntPsi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #1b2a38;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            background-color: #2a3b4c;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

            .logo img {
                max-width: 150px;
            }

        h1 {
            font-size: 24px;
            color: #ffffff;
            text-align: center;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 18px;
            color: #6B7280;
            text-align: center;
            margin-bottom: 20px;
        }

        .question {
            margin-bottom: 20px;
        }

            .question p {
                font-size: 16px;
                margin-bottom: 10px;
            }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

            .options label {
                background-color: #6B7280;
                padding: 8px 15px;
                border-radius: 5px;
                cursor: pointer;
                transition: background-color 0.3s;
            }

                .options label:hover {
                    background-color: #1428a3;
                }

            .options input[type="radio"] {
                display: none;
            }

                .options input[type="radio"]:checked + label {
                    background-color: #1428a3;
                    font-weight: 600;
                }

        .calculate-btn, .reset-btn {
            background-color: #6B7280;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 20px 10px;
            transition: background-color 0.3s;
        }

            .calculate-btn:hover, .reset-btn:hover {
                background-color: #4B5563;
            }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: #1b2a38;
            border-radius: 5px;
            text-align: center;
            font-size: 16px;
            display: none;
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="logo.png" alt="ProntPsi Logo">
        </div>
        <h1>Escala de Ansiedade de Hamilton (HAMA)</h1>
        <h2>Responda às perguntas abaixo com base na intensidade dos sintomas observados.</h2>

        <div id="form">
            <div id="questions" class="space-y-6"></div>
            <div class="button-container">
                <button class="calculate-btn" onclick="calculateScore()">Calcular Pontuação</button>
                <button class="reset-btn" onclick="resetForm()">Reiniciar</button>
            </div>
            <div id="result"></div>
        </div>
    </div>

    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const questions = [
            "Ansiedade (humor ansioso, preocupação, expectativa negativa)",
            "Tensão (nervosismo, incapacidade de relaxar, tensão emocional)",
            "Medos (de lugares, pessoas, objetos ou situações específicas)",
            "Insônia (dificuldade para adormecer, sono interrompido, sono não reparador)",
            "Dificuldades cognitivas (concentração prejudicada, memória fraca)",
            "Humor deprimido (tristeza, desânimo, perda de interesse)",
            "Sintomas somáticos musculares (dores, tremores, espasmos, rigidez)",
            "Sintomas somáticos sensoriais (zumbido, visão embaçada, ondas de calor/frio)",
            "Sintomas cardiovasculares (taquicardia, palpitações, dor torácica)",
            "Sintomas respiratórios (falta de ar, sensação de sufocamento)",
            "Sintomas gastrointestinais (náusea, dificuldade para engolir, desconforto abdominal)",
            "Sintomas geniturinários (micção frequente, urgência urinária, dismenorreia)",
            "Sintomas autonômicos (boca seca, rubor, sudorese, tontura)",
            "Comportamento durante a entrevista (agitação, inquietação, tremor visível)"
        ];

        const options = [
            { value: 0, label: "0 - Ausente" },
            { value: 1, label: "1 - Leve" },
            { value: 2, label: "2 - Moderado" },
            { value: 3, label: "3 - Grave" },
            { value: 4, label: "4 - Muito Grave" }
        ];

        function renderQuestions() {
            const questionContainer = document.getElementById('questions');
            questionContainer.innerHTML = '';
            questions.forEach((question, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question';
                questionDiv.innerHTML = `
                      <p>${index + 1}. ${question}</p>
                      <div class="options">
                        ${options.map(option => `
                          <input type="radio" name="q${index}" value="${option.value}" id="q${index}-${option.value}" required>
                          <label for="q${index}-${option.value}">${option.label}</label>
                        `).join('')}
                      </div>
                    `;
                questionContainer.appendChild(questionDiv);
            });
        }

        function getInterpretation(score) {
            if (score <= 17) return "Ansiedade leve";
            if (score <= 24) return "Ansiedade leve a moderada";
            if (score <= 30) return "Ansiedade moderada a grave";
            return "Ansiedade grave";
        }

        function displayResult(score, interpretation) {
            const resultDiv = document.getElementById('result');
            let message = `Resultados:\n\n`;
            message += `Pontuação Total: ${score} (de 0 a 56)\n`;
            message += `Interpretação: ${interpretation}\n\n`;
            message += `Consulte um profissional de saúde mental para uma avaliação completa.`;
            resultDiv.textContent = message;
            resultDiv.style.display = 'block';
        }

        async function enviarRespostaEscala(dados) {
            try {
                const response = await fetch("https://localhost:44322/api/respostas", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(dados)
                });

                if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);
                alert("Resposta salva com sucesso!");
            } catch (error) {
                console.error("Erro ao enviar respostas:", error);
                alert("Erro ao salvar as respostas.");
            }
        }

        function calculateScore() {
            const form = document.getElementById('form');
            for (let i = 0; i < questions.length; i++) {
                const selected = form.querySelector(`input[name="q${i}"]:checked`);
                if (!selected) {
                    alert('Por favor, responda a todas as perguntas antes de calcular.');
                    return;
                }
            }

            let totalScore = 0;
            const respostas = questions.map((pergunta, index) => {
                const valor = parseInt(document.querySelector(`input[name="q${index}"]:checked`).value);
                totalScore += valor;
                return { pergunta, resposta: valor };
            });

            const interpretation = getInterpretation(totalScore);
            displayResult(totalScore, interpretation);

            const pacienteId = getQueryParam("pacienteId");
            const formularioId = getQueryParam("formularioId");

            const dadosResposta = {
                pacienteId: pacienteId,
                formularioId: formularioId,
                dataResposta: new Date().toISOString(),
                pontuacaoTotal: totalScore,
                respostas: respostas
            };

            enviarRespostaEscala(dadosResposta);
        }

        function resetForm() {
            renderQuestions();
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'none';
        }

        renderQuestions();
    </script>
</body>
</html>
